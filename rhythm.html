<!DOCTYPE html>
<html>
<head>
  <title>Rhythm Tap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      text-align: center;
      font-family: system-ui;
      background: linear-gradient(135deg, #dfe6e9, #f8f6f3);
      margin: 0;
      padding: 10px;
    }

    h1 {
      font-size: clamp(20px, 5vw, 30px);
      margin: 10px;
    }

    h2 {
      font-size: clamp(16px, 4vw, 22px);
      margin: 5px;
      color: #555;
    }

    .message {
      font-size: clamp(14px, 3.5vw, 18px);
      margin: 10px;
      color: #666;
    }

    .game-area {
      width: 95%;
      max-width: 500px;
      height: clamp(150px, 30vh, 250px);
      margin: auto;
      background: white;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(30px, 8vw, 60px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .game-area.active {
      transform: scale(1.05);
      background: #dff9fb;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      flex: 1 1 40%;
      max-width: 180px;
      height: clamp(50px, 10vh, 70px);
      font-size: clamp(18px, 4vw, 26px);
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #55efc4, #00b894);
      color: black;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    button:active {
      transform: scale(0.95);
      color: white;
    }
  </style>
</head>

<body>

<h1>🎵 Rhythm Tap</h1>
<h2>Level: <span id="level">1</span></h2>
<div class="message" id="msg">Press any button to start</div>

<div class="game-area" id="display">Ready</div>

<div class="controls">
  <button onclick="pressLeft()">⬅️ Left</button>
  <button onclick="pressRight()">➡️ Right</button>
</div>

<script>
let pattern = [];
let userInput = [];
let level = 1;
let playing = false;

let display = document.getElementById("display");

/* START GAME */
function startGame() {
  pattern = [];
  level = 1;
  nextLevel();
}

/* NEXT LEVEL */
function nextLevel() {
  userInput = [];
  document.getElementById("level").innerText = level;
  document.getElementById("msg").innerText = "Watch the pattern";

  let random = Math.random() < 0.5 ? "L" : "R";
  pattern.push(random);

  showPattern();
}

/* SHOW PATTERN */
function showPattern() {
  let i = 0;
  playing = false;

  let interval = setInterval(() => {

    display.classList.add("active");

    display.innerText = pattern[i] === "L" ? "⬅️" : "➡️";

    setTimeout(() => {
      display.classList.remove("active");
    }, 400);

    i++;

    if (i >= pattern.length) {
      clearInterval(interval);
      setTimeout(() => {
        display.innerText = "Your Turn";
        document.getElementById("msg").innerText = "Repeat the pattern";
        playing = true;
      }, 800);
    }

  }, 1000);
}

/* BUTTON PRESSES */
function pressLeft() {
  animatePress();
  handleInput("L");
}

function pressRight() {
  animatePress();
  handleInput("R");
}

/* HANDLE INPUT */
function handleInput(input) {

  if (!playing) {
    startGame();
    return;
  }

  userInput.push(input);

  let index = userInput.length - 1;

  if (userInput[index] !== pattern[index]) {
    gameOver();
    return;
  }

  if (userInput.length === pattern.length) {
    level++;
    setTimeout(nextLevel, 1000);
  }
}

/* GAME OVER */
function gameOver() {
  playing = false;
  document.getElementById("msg").innerText =
    "Game Over! Press any button to restart";
  display.innerText = "❌";
}

/* ANIMATION */
function animatePress() {
  display.classList.add("active");
  setTimeout(() => display.classList.remove("active"), 200);
}

/* KEYBOARD SUPPORT */
document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowLeft") pressLeft();
  if (e.key === "ArrowRight") pressRight();
});
</script>

</body>
</html>
